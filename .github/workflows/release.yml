name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  quality:
    name: Static checks, unit tests, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run unit-tests

      - name: Build
        run: npm run build:server

  docker-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - name: Infrastructure tests
            command: npm run infra-tests
          - name: Use case tests
            command: npm run use-case-tests
          - name: End-to-end tests
            command: npm run e2e-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Docker
        run: |
          docker version
          docker compose version

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  release:
    name: Semantic release and publish image
    needs:
      - quality
      - docker-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      issues: write
      pull-requests: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Read released version
        id: released_version
        run: |
          if [ ! -f .semantic-release-version ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_version="$(cat .semantic-release-version)"
          package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"

          if [ "$release_version" != "$package_version" ]; then
            echo "Semantic Release produced $release_version, but package.json contains $package_version." >&2
            exit 1
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.released_version.outputs.released == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: steps.released_version.outputs.released == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.released_version.outputs.released == 'true'
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.released_version.outputs.version }},priority=1000
            type=raw,value=latest,priority=900

      - name: Build and push Docker image
        if: steps.released_version.outputs.released == 'true'
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.released_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest Docker image
        if: steps.released_version.outputs.released == 'true'
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
